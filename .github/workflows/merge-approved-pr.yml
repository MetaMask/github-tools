name: Merge Approved PR

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
        description: 'The number of the pull request to process'
      required-base-branch:
        required: true
        type: string
        description: 'The required base branch name (e.g., main)'
      head-branch-pattern:
        required: true
        type: string
        description: 'Regex pattern for the required head branch (e.g., ^stable-main-[0-9]+\.[0-9]+\.[0-9]+$)'
      merge-method:
        required: false
        type: string
        default: 'merge'
        description: "Merge method: 'merge' (merge commit) or 'squash' (squash merge)"
      verify-version-bump:
        required: false
        type: boolean
        default: false
        description: 'Whether to verify that this PR is purely a version bump'
    secrets:
      github-token:
        required: true
        description: 'GitHub token with permissions to merge'

jobs:
  merge-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Merge approved PR
        uses: ./.github/actions/merge-approved-pr
        with:
          pr-number: ${{ inputs.pr-number }}
          required-base-branch: ${{ inputs.required-base-branch }}
          head-branch-pattern: ${{ inputs.head-branch-pattern }}
          merge-method: ${{ inputs.merge-method }}
          verify-version-bump: ${{ inputs.verify-version-bump && 'true' || 'false' }}
          github-token: ${{ secrets.github-token }}
